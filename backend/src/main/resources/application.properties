spring.application.name=dsm-platform
server.port=${SERVER_PORT:8080}

# Local-first database configuration. Override these env vars for PostgreSQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:dsm;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

# JWT Configuration
# Use a long random secret in real environments: at least 32 bytes for HS256.
app.jwt.secret=${JWT_SECRET:local-dev-jwt-secret-key-that-is-at-least-32-bytes-long}
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:PT15M}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:P7D}

# Frontend origins allowed during local development.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
